<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Data Table</title>
    <meta name="description"
        content="AJAX-powered user data table with search, sort, and pagination backed by PHP session caching." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ── Reset & tokens ─────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3251;
            --accent: #6c63ff;
            --accent2: #a78bfa;
            --danger: #f87171;
            --text: #e2e8f0;
            --text-muted: #8892a4;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* ── Page wrapper ──────────────────────────────── */
        .page-wrapper {
            max-width: 1080px;
            margin: 0 auto;
        }

        /* ── Header ────────────────────────────────────── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header h1 span {
            display: block;
            font-size: 0.8rem;
            font-weight: 400;
            -webkit-text-fill-color: var(--text-muted);
            background: none;
            margin-top: 2px;
        }

        /* ── Card ──────────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* ── Toolbar ───────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 400px;
        }

        .search-wrap svg {
            position: absolute;
            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 10px 14px 10px 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        #searchInput::placeholder {
            color: var(--text-muted);
        }

        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .limit-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        #limitSelect {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 6px 10px;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        #limitSelect:focus {
            border-color: var(--accent);
        }

        /* Cache clear button */
        #clearCacheBtn {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            white-space: nowrap;
        }

        #clearCacheBtn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ── Table ─────────────────────────────────────── */
        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead tr {
            background: linear-gradient(90deg, #2a2060, #1e2a5e);
            border-bottom: 2px solid var(--accent);
        }

        th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #c4b5fd;
            white-space: nowrap;
        }

        th[data-col] {
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, color 0.15s;
        }

        th[data-col]:hover {
            background: rgba(108, 99, 255, 0.15);
            color: #fff;
        }

        th[data-col].active-col {
            color: #fff;
        }

        .sort-icon {
            font-style: normal;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }

        tbody tr:hover {
            background: rgba(108, 99, 255, 0.07);
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        td {
            padding: 13px 16px;
            color: var(--text);
        }

        td:first-child {
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        /* Special states */
        .loading-cell,
        .empty-cell,
        .error-cell {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .error-cell {
            color: var(--danger);
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Footer ────────────────────────────────────── */
        .table-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface2);
        }

        #resultInfo {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        /* ── Pagination ─────────────────────────────────── */
        #paginationContainer {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text);
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            outline: none;
        }

        .page-btn:hover:not(.disabled):not(.active) {
            background: rgba(108, 99, 255, 0.15);
            border-color: var(--accent);
            color: var(--accent2);
        }

        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        .page-btn.disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .page-ellipsis {
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 0 4px;
        }

        /* ── Cache badge ─────────────────────────────────── */
        .cache-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            background: rgba(108, 99, 255, 0.15);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 20px;
            font-size: 0.72rem;
            color: var(--accent2);
            font-weight: 500;
        }

        .cache-badge .dot {
            width: 6px;
            height: 6px;
            background: var(--accent2);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── Action icon buttons ─────────────────────────────── */
        .action-cell {
            white-space: nowrap;
            text-align: center;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            transition: background 0.15s, transform 0.12s;
            background: transparent;
            color: var(--text-muted);
        }

        .btn-icon:hover {
            transform: scale(1.12);
        }

        .btn-icon.edit:hover {
            background: rgba(108, 99, 255, 0.2);
            color: var(--accent2);
        }

        .btn-icon.delete:hover {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
        }

        /* ── Add User button ─────────────────────────────────── */
        #addUserBtn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 2px 12px rgba(108, 99, 255, 0.35);
        }

        #addUserBtn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(108, 99, 255, 0.5);
        }

        /* ── Modal overlay ───────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 460px;
            padding: 28px 28px 24px;
            position: relative;
            animation: modalIn 0.22s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(-18px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.3rem;
            line-height: 1;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
        }

        .modal-close:hover {
            color: var(--danger);
            background: rgba(248, 113, 113, 0.1);
        }

        /* Form fields inside modal */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }

        .form-group input.is-invalid {
            border-color: var(--danger);
        }

        .field-error {
            font-size: 0.75rem;
            color: var(--danger);
            margin-top: 4px;
            display: none;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 22px;
        }

        .btn-cancel {
            padding: 9px 18px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-cancel:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-save {
            padding: 9px 22px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 2px 10px rgba(108, 99, 255, 0.3);
        }

        .btn-save:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .btn-save:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Confirm delete dialog ───────────────────────────── */
        .modal-danger .modal-title {
            background: none;
            -webkit-text-fill-color: var(--danger);
            color: var(--danger);
        }

        .modal-danger .btn-save {
            background: linear-gradient(135deg, #ef4444, #f87171);
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.35);
        }

        /* ── Toast notification ──────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #fff;
            z-index: 2000;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.28s, transform 0.28s;
            pointer-events: none;
            max-width: 320px;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        #toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); }
        #toast.error   { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    </style>
</head>

<body>
    <div class="page-wrapper">

        <!-- ── Header ── -->
        <div class="page-header">
            <h1>
                User Data Table
                <span>Session-cached · Search · Sort · Paginate</span>
            </h1>
            <div class="cache-badge">
                <span class="dot"></span>
                Session Cache Active
            </div>
        </div>

        <!-- ── Card ── -->
        <div class="card">

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="search-wrap">
                    <!-- Search icon -->
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search by firstname, lastname or email…"
                        autocomplete="off" />
                </div>

                <div class="toolbar-right">
                    <div class="limit-wrap">
                        <label for="limitSelect">Rows:</label>
                        <select id="limitSelect">
                            <option value="10" selected>10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                    <button id="clearCacheBtn" title="Clear session cache and re-fetch from DB">
                        ↺ Clear Cache
                    </button>
                    <button id="addUserBtn" title="Add a new user">
                        <!-- Plus icon -->
                        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Add User
                    </button>
                </div>
            </div>

            <!-- Table -->
            <div class="table-scroll">
                <table id="userTable">
                    <thead>
                        <tr>
                            <th data-col="id">
                                ID <span class="sort-icon"> ▲</span>
                            </th>
                            <th data-col="firstname">
                                Firstname <span class="sort-icon"> ⇅</span>
                            </th>
                            <th data-col="lastname">
                                Lastname <span class="sort-icon"> ⇅</span>
                            </th>
                            <th data-col="email">
                                Email <span class="sort-icon"> ⇅</span>
                            </th>
                            <th style="text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="5" class="loading-cell">
                                <span class="spinner"></span> Loading…
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Footer: info + pagination -->
            <div class="table-footer">
                <div id="resultInfo"></div>
                <div id="paginationContainer"></div>
            </div>
        </div>
    </div>

    <!-- ── CRUD Modal (Create / Edit) ── -->
    <div class="modal-overlay" id="crudModalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal" id="crudModal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Add User</span>
                <button class="modal-close" id="modalCloseBtn" title="Close">&times;</button>
            </div>
            <form id="crudForm" novalidate>
                <input type="hidden" id="formUserId" name="id" value="" />
                <div class="form-group">
                    <label for="formFirstname">Firstname</label>
                    <input type="text" id="formFirstname" name="firstname" placeholder="e.g. John" autocomplete="off" />
                    <span class="field-error" id="errFirstname">Firstname is required.</span>
                </div>
                <div class="form-group">
                    <label for="formLastname">Lastname</label>
                    <input type="text" id="formLastname" name="lastname" placeholder="e.g. Doe" autocomplete="off" />
                    <span class="field-error" id="errLastname">Lastname is required.</span>
                </div>
                <div class="form-group">
                    <label for="formEmail">Email</label>
                    <input type="email" id="formEmail" name="email" placeholder="e.g. john@example.com" autocomplete="off" />
                    <span class="field-error" id="errEmail">Valid email is required.</span>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="modalCancelBtn">Cancel</button>
                    <button type="submit" class="btn-save" id="modalSaveBtn">
                        <!-- Save icon -->
                        <svg style="vertical-align:-2px;margin-right:5px" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── Confirm Delete Modal ── -->
    <div class="modal-overlay" id="deleteModalOverlay" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <div class="modal modal-danger" id="deleteModal">
            <div class="modal-header">
                <span class="modal-title" id="deleteModalTitle">Delete User</span>
                <button class="modal-close" id="deleteModalCloseBtn" title="Close">&times;</button>
            </div>
            <p style="color:var(--text-muted);font-size:0.9rem;line-height:1.6;">
                Are you sure you want to delete <strong id="deleteUserName" style="color:var(--text);"></strong>?
                This action <strong style="color:var(--danger);">cannot be undone</strong>.
            </p>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" id="deleteModalCancelBtn">Cancel</button>
                <button type="button" class="btn-save" id="confirmDeleteBtn">
                    <!-- Trash icon -->
                    <svg style="vertical-align:-2px;margin-right:5px" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14H6L5 6"/>
                        <path d="M10 11v6M14 11v6"/>
                        <path d="M9 6V4h6v2"/>
                    </svg>
                    Delete
                </button>
            </div>
        </div>
    </div>

    <!-- ── Toast ── -->
    <div id="toast" role="alert" aria-live="polite"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="./ajax_tabel.js"></script>
</body>

</html>
